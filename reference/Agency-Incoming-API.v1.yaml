openapi: 3.0.0
info:
  title: Agency Incoming API
  version: '1.0'
  description: API spec for agencies to process incoming requests from Freede.
servers: []
paths:
  /registration:
    post:
      summary: Register consumer
      tags:
        - Registration
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        '401':
          description: Unauthorized
      operationId: post-registration
      parameters:
        - schema:
            type: string
          in: header
          name: Freede-Verification-Key
          description: SHA256 Hash of Token and API key
        - schema:
            type: string
          in: header
          name: Freede-API-Version
          description: Freede Agency Incoming API Version
        - schema:
            type: string
          in: header
          name: Freede-Verification-Token
          description: Token Salt
      description: Freede will submit this POST request when a consumer is attempting to register with the agency. Agency may perform their own validation checks and return a response.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first:
                  type: string
                last:
                  type: string
                address:
                  type: string
                address2:
                  type: string
                city:
                  type: string
                state:
                  type: string
                zip:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                  format: email
                regcode:
                  type: string
                verify:
                  type: boolean
                optins:
                  $ref: '#/components/schemas/Optins'
              required:
                - regcode
                - verify
            examples: {}
        description: Consumer registration information
  '/account/{accountNum}':
    get:
      summary: Get account details
      tags:
        - Accounts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
              examples: {}
        '204':
          description: No Content
      operationId: get-account
      parameters:
        - schema:
            type: string
          in: header
          name: Freede-Verification-Key
          description: SHA256 Hash of Token and API key
        - schema:
            type: string
          in: header
          name: Freede-API-Version
          description: Freede Agency Incoming API Version
        - schema:
            type: string
          in: header
          name: Freede-Verification-Token
          description: Token Salt
      description: Endpoint to get the account details from the agency
    parameters:
      - schema:
          type: string
        name: accountNum
        in: path
        required: true
        description: Agency account number
  /forms:
    post:
      summary: Consumer submitted form
      tags:
        - Forms
      responses:
        '200':
          description: OK
      operationId: post-forms
      parameters:
        - schema:
            type: string
          in: header
          name: Freede-Verification-Key
          description: SHA256 Hash of Token and API key
        - schema:
            type: string
          in: header
          name: Freede-API-Version
          description: Freede Agency Incoming API Version
        - schema:
            type: string
          in: header
          name: Freede-Verification-Token
          description: Token Salt
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - dispute
                    - attorney
                    - bankruptcy
                form:
                  oneOf:
                    - $ref: '#/components/schemas/DisputeForm'
                    - $ref: '#/components/schemas/AttorneyForm'
                    - $ref: '#/components/schemas/BankruptcyForm'
                task:
                  type: array
                  description: 'If provided, use this ID and type to submit back to the Agency API'
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum:
                          - proof_of_debt
      description: Endpoint to receive forms consumer has submitted
  '/consumer/{consumerRef}':
    parameters:
      - schema:
          type: string
        name: consumerRef
        in: path
        required: true
    put:
      summary: Update consumer demographics
      tags:
        - Consumers
      responses:
        '200':
          description: OK
      operationId: put-consumer-consumerRef
      parameters:
        - schema:
            type: string
          in: header
          name: Freede-Verification-Key
          description: SHA256 Hash of Token and API key
        - schema:
            type: string
          in: header
          name: Freede-API-Version
          description: Freede Agency Incoming API Version
        - schema:
            type: string
          in: header
          name: Freede-Verification-Token
          description: Token Salt
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Consumer'
      description: Endpoint to receive updated consumer demographics
    delete:
      summary: Deregister consumer
      operationId: delete-consumer-consumerRef
      parameters:
        - schema:
            type: string
          in: header
          name: Freede-Verification-Key
          description: SHA256 Hash of Token and API key
        - schema:
            type: string
          in: header
          name: Freede-API-Version
          description: Freede Agency Incoming API Version
        - schema:
            type: string
          in: header
          name: Freede-Verification-Token
          description: Token Salt
      responses:
        '200':
          description: OK
      description: Endpoint to deregister consumer from Freede
      tags:
        - Consumers
  '/consumer/{consumerRef}/optins':
    parameters:
      - schema:
          type: string
        name: consumerRef
        in: path
        required: true
        description: Agency consumer reference
    put:
      summary: Update consumer optins
      tags:
        - Consumers
      responses:
        '200':
          description: OK
      operationId: put-consumer-consumerRef-optins
      parameters:
        - schema:
            type: string
          in: header
          name: Freede-Verification-Key
          description: SHA256 Hash of Token and API key
        - schema:
            type: string
          in: header
          name: Freede-API-Version
          description: Freede Agency Incoming API Version
        - schema:
            type: string
          in: header
          name: Freede-Verification-Token
          description: Token Salt
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Optins'
            examples:
              Example:
                value:
                  sms:
                    allowed: true
                    default: false
                  phone:
                    allowed: true
                    default: false
                  email:
                    allowed: true
                    default: true
                  push:
                    allowed: true
                    default: false
      description: Endpoint to receive updated consumer optins
  '/consumer/{consumerRef}/conversation':
    parameters:
      - schema:
          type: string
        name: consumerRef
        in: path
        required: true
    post:
      summary: Consumer conversation
      tags:
        - Consumers
      responses:
        '200':
          description: OK
      operationId: post-consumer-consumerRef-conversation
      parameters:
        - schema:
            type: string
          in: header
          name: Freede-Verification-Key
          description: SHA256 Hash of Token and API key
        - schema:
            type: string
          in: header
          name: Freede-API-Version
          description: Freede Agency Incoming API Version
        - schema:
            type: string
          in: header
          name: Freede-Verification-Token
          description: Token Salt
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Conversation'
      description: Endpoint to receive notice of consumer conversation. Can use Id to retrieve conversation details from Agency API
tags:
  - name: Accounts
  - name: Consumers
  - name: Forms
  - name: Registration
components:
  schemas:
    Account:
      description: Agency Account
      type: object
      properties:
        ref:
          type: string
          minLength: 1
          description: Agency account reference number
        desc:
          type: string
          minLength: 1
          description: Agency account description
        status_reason:
          type: string
          minLength: 1
        status:
          type: string
          minLength: 1
        balance_current:
          type: number
        balance_start:
          type: number
        balance_buckets:
          type: array
          uniqueItems: true
          minItems: 1
          items:
            type: object
            properties:
              name:
                type: string
                minLength: 1
              balance_current:
                type: number
              balance_start:
                type: number
              type:
                type: string
                minLength: 1
            required:
              - name
              - balance_current
              - balance_start
              - type
        agency:
          type: object
          properties:
            ref:
              type: string
              minLength: 1
            last_payment_amt:
              type: number
            last_activity:
              type: string
              minLength: 1
            last_payment_date:
              type: string
              minLength: 1
          required:
            - ref
            - last_payment_amt
            - last_activity
            - last_payment_date
        creditor:
          type: object
          properties:
            ref:
              type: string
              minLength: 1
            last_payment_amt:
              type: number
            last_activity:
              type: string
              minLength: 1
            last_payment_date:
              type: string
              minLength: 1
            name:
              type: string
              minLength: 1
          required:
            - ref
            - last_payment_amt
            - last_activity
            - last_payment_date
            - name
        consumer:
          type: object
          properties:
            ref:
              type: string
              minLength: 1
          required:
            - ref
    Attorney:
      description: ''
      type: object
      properties:
        name:
          type: string
          minLength: 1
        lawfirm:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
        fax:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
    AttorneyForm:
      title: AttorneyForm
      type: object
      properties:
        reason:
          type: string
        attorney:
          $ref: '#/components/schemas/Attorney'
    Bankruptcy:
      description: ''
      type: object
      properties:
        chapter:
          type: string
          minLength: 1
        filing_date:
          type: string
          minLength: 1
        discharge_date:
          type: string
          minLength: 1
      required:
        - chapter
        - filing_date
        - discharge_date
    BankruptcyForm:
      title: BankruptcyForm
      type: object
      properties:
        bankruptcy:
          $ref: '#/components/schemas/Bankruptcy'
        attorney:
          $ref: '#/components/schemas/Attorney'
    Consumer:
      description: ''
      type: object
      properties:
        first:
          type: string
          minLength: 1
        last:
          type: string
          minLength: 1
        address:
          type: string
          minLength: 1
        address2:
          type: string
          minLength: 1
        city:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        postal:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
        ref:
          type: string
          minLength: 1
    Conversation:
      description: ''
      type: object
      properties:
        type:
          type: string
          minLength: 1
        when:
          type: string
          minLength: 1
        id:
          type: string
          minLength: 1
    DisputeForm:
      title: DisputeForm
      type: object
      properties:
        amount:
          type: number
        reason:
          type: string
        bankruptcy:
          $ref: '#/components/schemas/Bankruptcy'
        attorney:
          $ref: '#/components/schemas/Attorney'
        accounts:
          type: array
          items:
            type: string
    Optin:
      title: Optin
      type: object
      properties:
        allowed:
          type: boolean
        default:
          type: boolean
    Optins:
      title: Optins
      type: object
      properties:
        sms:
          $ref: '#/components/schemas/Optin'
        voice:
          $ref: '#/components/schemas/Optin'
        email:
          $ref: '#/components/schemas/Optin'
        push:
          $ref: '#/components/schemas/Optin'
